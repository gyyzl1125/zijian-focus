<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在更新自见</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f3f6ec;
        color: #20301f;
        font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      }

      main {
        width: min(420px, calc(100% - 32px));
        padding: 24px;
        border: 1px solid #dfe7d5;
        border-radius: 8px;
        background: white;
        text-align: center;
      }

      a {
        color: #335d36;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>正在更新</h1>
      <p id="status">正在清理旧缓存，马上进入新版。</p>
      <p><a id="manualLink" href="./index.html?v=8">如果没有自动跳转，点这里进入</a></p>
    </main>

    <script>
      async function clearOldCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        document.querySelector("#status").textContent = "旧缓存已经清理完成，正在打开新版。";
        window.location.replace("./index.html?v=8");
      }

      clearOldCache().catch(() => {
        document.querySelector("#status").textContent = "自动清理失败，可以点下面的链接进入新版。";
      });
    </script>
  </body>
</html>
